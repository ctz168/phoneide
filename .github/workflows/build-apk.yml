name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      ide_ref:
        description: 'ctz168/ide branch/tag/SHA to bundle (default: main)'
        required: false
        default: 'main'
      build_type:
        description: 'Build type'
        required: false
        default: 'both'
        type: choice
        options:
          - debug
          - release
          - both

permissions:
  contents: write

env:
  IDE_REPO: ctz168/ide

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android SDK components
      run: |
        # Explicitly install the platform and build-tools required by compileSdk/targetSdk
        sdkmanager --install "platforms;android-35" "build-tools;35.0.0"
        # Accept all remaining licenses
        yes | sdkmanager --licenses > /dev/null 2>&1 || true

    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq binutils zstd

    # Step 1: Fetch proot binaries (Termux .deb -> jniLibs/*.so)
    - name: Fetch proot binaries
      run: |
        chmod +x scripts/fetch-proot-binaries.sh
        bash scripts/fetch-proot-binaries.sh

    - name: Verify jniLibs
      run: |
        echo "=== jniLibs contents ==="
        find android/app/src/main/jniLibs -name "*.so" -exec ls -la {} \;
        echo ""
        TOTAL=$(find android/app/src/main/jniLibs -name "*.so" | wc -l)
        echo "Total .so files: $TOTAL"
        if [ "$TOTAL" -lt 3 ]; then
          echo "ERROR: Expected at least 3 .so files (proot + loader + talloc)"
          exit 1
        fi

    # Step 2: Clone ctz168/ide and copy IDE files to Android assets
    - name: Clone IDE from ctz168/ide
      id: clone_ide
      run: |
        IDE_REF="${{ github.event.inputs.ide_ref || 'main' }}"
        echo "Cloning ctz168/ide at ref: $IDE_REF"
        git clone --depth 1 --branch "$IDE_REF" https://github.com/${IDE_REPO}.git /tmp/ide
        echo "Cloned commit: $(cd /tmp/ide && git rev-parse HEAD)"
        echo "ide_commit=$(cd /tmp/ide && git rev-parse HEAD)" >> $GITHUB_OUTPUT
        echo "=== IDE files ==="
        find /tmp/ide -type f -name "*.py" -o -name "*.html" -o -name "*.js" -o -name "*.css" | head -30

    - name: Copy IDE files to assets
      run: |
        mkdir -p android/app/src/main/assets/ide
        # Core Python backend
        cp /tmp/ide/server.py android/app/src/main/assets/ide/
        cp /tmp/ide/utils.py android/app/src/main/assets/ide/
        cp /tmp/ide/requirements.txt android/app/src/main/assets/ide/
        # Routes (blueprint modules)
        cp -r /tmp/ide/routes android/app/src/main/assets/ide/
        # Frontend static files
        cp -r /tmp/ide/static android/app/src/main/assets/ide/
        # Write version.txt and commit.txt for runtime version detection
        VERSION=$(grep 'versionName' android/app/build.gradle | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
        IDE_COMMIT=$(cd /tmp/ide && git rev-parse HEAD)
        FULL_TAG="v${VERSION}-build.${{ github.run_number }}"
        echo "$FULL_TAG" > android/app/src/main/assets/ide/version.txt
        echo "$IDE_COMMIT" > android/app/src/main/assets/ide/commit.txt
        echo "version.txt: $FULL_TAG"
        echo "commit.txt: $IDE_COMMIT (from ctz168/ide)"
        echo "=== Assets ==="
        find android/app/src/main/assets/ide -type f | wc -l
        echo "files packaged"
        # Verify critical files exist
        for f in server.py utils.py routes/__init__.py static/index.html; do
          if [ ! -f "android/app/src/main/assets/ide/$f" ]; then
            echo "ERROR: Missing critical file: $f"
            exit 1
          fi
        done
        echo "All critical files verified"

    - name: Build Debug APK
      working-directory: android
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon --stacktrace 2>&1

    - name: Decode signing keystore from secrets
      run: |
        # Use fixed keystore from GitHub Secrets for consistent APK signatures
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/keystore.jks
        printf 'storeFile=keystore.jks\nstorePassword=${{ secrets.KEYSTORE_PASSWORD }}\nkeyAlias=${{ secrets.KEYSTORE_ALIAS }}\nkeyPassword=${{ secrets.KEYSTORE_PASSWORD }}\n' > android/key.properties
        echo "Keystore decoded from secrets"

    - name: Build Release APK
      working-directory: android
      run: ./gradlew assembleRelease --no-daemon --stacktrace 2>&1

    # Step 4: Prepare output
    - name: Prepare APK artifacts
      run: |
        mkdir -p dist
        cp build/app/outputs/apk/debug/app-debug.apk dist/PhoneIDE-debug.apk
        cp build/app/outputs/apk/release/app-release.apk dist/PhoneIDE-release.apk
        echo "### Build Artifacts ###"
        ls -lh dist/
        echo ""
        echo "Debug: $(du -h dist/PhoneIDE-debug.apk | cut -f1)"
        echo "Release: $(du -h dist/PhoneIDE-release.apk | cut -f1)"

    # Upload artifacts
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: PhoneIDE-debug
        path: dist/PhoneIDE-debug.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: PhoneIDE-release
        path: dist/PhoneIDE-release.apk

    # Publish to GitHub Releases
    - name: Get version info
      id: version
      run: |
        VERSION=$(grep 'versionName' android/app/build.gradle | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Building version: $VERSION"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version }}-build.${{ github.run_number }}
        name: "PhoneIDE v${{ steps.version.outputs.version }}-build.${{ github.run_number }}"
        body: |
          ## PhoneIDE v${{ steps.version.outputs.version }}

          Mobile Web IDE for Android - based on proot Ubuntu.

          ### Changes
          - APK commit: `${{ github.sha }}`
          - IDE commit: `${{ steps.clone_ide.outputs.ide_commit || 'main' }}`
          - Build: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          - Run: #${{ github.run_number }}

          ### Features
          - Code editor with syntax highlighting (CodeMirror)
          - Terminal emulator (proot Ubuntu shell)
          - Git operations (clone, pull, push, commit)
          - LLM AI chat (OpenAI-compatible API)
          - File manager with create/rename/delete
          - Python/Shell execution with streaming output

          ### Install
          1. Download `PhoneIDE-release.apk`
          2. Enable "Install from unknown sources"
          3. Install APK

          ### First Launch
          - App will download Ubuntu 24.04 rootfs (~300MB)
          - Bootstrap installs Python + Flask automatically
          - IDE accessible at `http://127.0.0.1:1239`

          > Requires ~500MB free space for Ubuntu environment
        files: |
          dist/PhoneIDE-debug.apk
          dist/PhoneIDE-release.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
