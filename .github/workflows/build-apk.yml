name: Build & Release APK

on:
  push:
    branches: [ main ]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle.kts', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        working-directory: android
        run: chmod +x gradlew

      - name: Create local.properties (sdk.dir)
        working-directory: android
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/debug/*.apk PhoneIDE-debug.apk

      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PhoneIDE-debug
          path: PhoneIDE-debug.apk
          retention-days: 30

      - name: Delete old pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true

      - name: Publish to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest PhoneIDE-debug.apk \
            --title "PhoneIDE v2.0.0 (Build ${{ github.run_number }})" \
            --notes "Automated debug build from commit \`${{ github.sha }}\`

          **Build**: #${{ github.run_number }}
          **Commit**: ${{ github.sha }}
          **Branch**: ${{ github.ref_name }}
          **Time**: ${{ github.event.head_commit.timestamp }}" \
            --prerelease
